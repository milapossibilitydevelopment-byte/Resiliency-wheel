let idx = 0;
const img = document.getElementById('card');
const counter = document.getElementById('counter');
const labelEl = document.getElementById('label');
const dotsEl = document.getElementById('dots');
SLIDES.forEach((_, i) => {
  const d = document.createElement('button');
  d.className = 'dot';
  d.addEventListener('click', () => { idx = i; render(); });
  dotsEl.appendChild(d);
});
function render(){
  img.src = SLIDES[idx].src;
  labelEl.textContent = SLIDES[idx].label || '';
  counter.textContent = (idx+1) + ' / ' + SLIDES.length;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active', i===idx));
}
function go(n){ idx = (idx + n + SLIDES.length) % SLIDES.length; render(); }
document.getElementById('next').addEventListener('click', ()=>go(1));
document.getElementById('prev').addEventListener('click', ()=>go(-1));
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') go(1);
  if(e.key==='ArrowLeft') go(-1);
});
// swipe
let x0=null;
const stage = document.getElementById('stage');
stage.addEventListener('touchstart', e=>{ x0 = e.changedTouches[0].clientX; }, {passive:true});
stage.addEventListener('touchend', e=>{
  if(x0===null) return;
  const dx = e.changedTouches[0].clientX - x0;
  if(Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
  x0=null;
}, {passive:true});
render();
</script>
